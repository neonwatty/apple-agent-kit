version: 2

goal:
  title: "Private Adapter Infrastructure Preflight"
  slug: "private-adapter-infrastructure-preflight"
  kind: existing_plan
  tranche: "Resolve private adapter hygiene and run preflight-only runner/device readiness checks before any real infrastructure execution."
  status: active
  oracle:
    signal: "Adapter hygiene is resolved, preflight-only runner/device readiness receipts or blockers exist, no prohibited infrastructure action occurred, public leakage checks pass, and the next gated action is explicit."
    cadence: "after each Worker package and at final audit"
    final_proof: "Final Judge or PM receipt records full_outcome_complete: true and lists adapter status, preflight receipts/blockers, leakage check, and the recommended next gated action."
  intake:
    original_request: "Do the next infrastructure preflight step."
    interpreted_outcome: "Prepare and execute a GoalBuddy-controlled infrastructure preflight tranche for the validated private adapter."
    input_shape: existing_plan
    audience: "Apple Agent Kit maintainers and private adapter maintainers."
    authority: approved
    proof_type: test
    completion_proof: "Private adapter hygiene is settled; preflight-only readiness checks have evidence or blockers; no workflow dispatch/install/WDA/screenshot occurred; next gated action is explicit."
    likely_misfire: "Running real device or self-hosted workflow actions instead of stopping at preflight, or committing private values into the public repo."
    blind_spots_considered:
      - "Whether the private adapter should be committed or parked."
      - "Private artifacts may pre-exist and should not be mixed into adapter work."
      - "Runner/device readiness checks can accidentally become mutating actions."
      - "Public GoalBuddy files must remain sanitized."
      - "Infrastructure work should be split into explicit approval gates."
    existing_plan_facts:
      - "Validated private adapter exists from the previous tranche."
      - "Private repo has pre-existing untracked artifacts."
      - "Next work should run preflight-only readiness checks."
      - "No workflow dispatch, app install, WDA, screenshots, host-app automation, or UI smoke in this tranche."
      - "A later tranche may test infrastructure after explicit target/action approval."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  exact_human_approval_can_terminal_wait: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/private-adapter-infrastructure-preflight/"
    command: "node /Users/neonwatty/.codex/plugins/cache/goalbuddy/goalbuddy/0.3.9/skills/goalbuddy/surfaces/local-goal-board/scripts/local-goal-board.mjs --goal docs/goals/private-adapter-infrastructure-preflight"

active_task: T001

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: active
    reasoning_hint: medium
    objective: "Map current private adapter status, pre-existing private artifacts, and safe preflight commands without mutating runner, device, app, or workflow state."
    inputs:
      - "Goal charter."
      - "Previous private-adapter validation receipts."
      - "Private repo status, read-only."
      - "Public Apple Agent Kit CLI and docs, read-only."
    constraints:
      - "Read-only."
      - "Do not commit private adapter or public board changes in this task."
      - "Do not dispatch workflows."
      - "Do not install apps, start WDA, take screenshots, launch host apps, or run UI smoke."
      - "Do not print secrets, tokens, signing values, bundle IDs, device IDs, or private runner labels in public committed notes."
    expected_output:
      - "Private adapter status: commit candidate | park | ambiguous."
      - "Private artifact hygiene summary."
      - "Safe runner preflight command candidates."
      - "Safe device readiness command candidates."
      - "Candidate Worker package with allowed files, verify commands, and stop conditions."
    receipt: null

  - id: T002
    type: judge
    assignee: Judge
    status: queued
    reasoning_hint: high
    objective: "Choose the first largest safe Worker package: adapter hygiene, runner preflight, or device readiness."
    inputs:
      - "T001 receipt or note."
      - "Goal oracle."
      - "Current public and private repo status."
    constraints:
      - "Do not implement."
      - "Reject any Worker package that dispatches workflows or mutates runner/device/app state."
      - "Keep private details out of public committed files."
      - "Set explicit allowed_files, verify commands, and stop_if conditions."
    expected_output:
      - "Decision: approved | revise | blocked."
      - "Exact Worker objective."
      - "allowed_files."
      - "verify."
      - "stop_if."
      - "Deferred follow-up tasks, if any."
    receipt: null

  - id: T003
    type: worker
    assignee: Worker
    status: queued
    reasoning_hint: medium
    objective: "Execute the first safe preflight package selected by Judge."
    allowed_files: []
    verify: []
    stop_if:
      - "Need files outside Judge-approved allowed_files."
      - "Need to commit private values to the public repo."
      - "Need workflow dispatch, app install, WDA, screenshots, host-app automation, or UI smoke."
      - "Preflight command is discovered to be mutating."
      - "Verification fails twice for the same reason."
    receipt: null

  - id: T004
    type: worker
    assignee: Worker
    status: queued
    reasoning_hint: medium
    objective: "Run the next safe preflight package if T003 does not complete adapter, runner, and device readiness evidence."
    allowed_files: []
    verify: []
    stop_if:
      - "T003 completed all required preflight evidence."
      - "Need workflow dispatch, app install, WDA, screenshots, host-app automation, or UI smoke."
      - "Need explicit user approval for a mutating action."
      - "Need files outside PM/Judge-approved allowed_files."
    receipt: null

  - id: T005
    type: judge
    assignee: Judge
    status: queued
    reasoning_hint: high
    objective: "Decide the next gated infrastructure action after preflight evidence is gathered."
    inputs:
      - "Done Worker receipts."
      - "Adapter hygiene evidence."
      - "Runner/device preflight evidence or blockers."
      - "Public leakage check."
    constraints:
      - "Read-only."
      - "Do not dispatch workflows or mutate infrastructure."
      - "Do not expose private details in public committed notes."
    expected_output:
      - "readiness: ready | not_ready."
      - "Recommended next gated action."
      - "Required exact approval phrase or operator input."
      - "Risks to carry forward."
    receipt: null

  - id: T999
    type: judge
    assignee: Judge
    status: queued
    reasoning_hint: high
    objective: "Final audit: decide whether the infrastructure preflight tranche is complete."
    inputs:
      - "All done task receipts."
      - "Last verification commands."
      - "Current dirty diff in public and private repos."
      - "Goal oracle."
    constraints:
      - "Do not implement."
      - "Reject completion if required Worker work remains queued or active."
      - "Reject completion if adapter hygiene, preflight evidence/blockers, leakage proof, or next-action decision is missing."
      - "Reject completion if real infrastructure was touched during this tranche."
    expected_output:
      - "complete | not_complete."
      - "full_outcome_complete: true | false."
      - "Evidence mapped to the oracle."
      - "Missing evidence or next task if not complete."
    receipt: null

checks:
  dirty_fingerprint: unknown
  last_verification:
    result: unknown
    task: null
    commands: []
