version: 2

goal:
  title: "Private Adapter Infrastructure Preflight"
  slug: "private-adapter-infrastructure-preflight"
  kind: existing_plan
  tranche: "Resolve private adapter hygiene and run preflight-only runner/device readiness checks before any real infrastructure execution."
  status: done
  oracle:
    signal: "Adapter hygiene is resolved, preflight-only runner/device readiness receipts or blockers exist, no prohibited infrastructure action occurred, public leakage checks pass, and the next gated action is explicit."
    cadence: "after each Worker package and at final audit"
    final_proof: "Final Judge or PM receipt records full_outcome_complete: true and lists adapter status, preflight receipts/blockers, leakage check, and the recommended next gated action."
  intake:
    original_request: "Do the next infrastructure preflight step."
    interpreted_outcome: "Prepare and execute a GoalBuddy-controlled infrastructure preflight tranche for the validated private adapter."
    input_shape: existing_plan
    audience: "Apple Agent Kit maintainers and private adapter maintainers."
    authority: approved
    proof_type: test
    completion_proof: "Private adapter hygiene is settled; preflight-only readiness checks have evidence or blockers; no workflow dispatch/install/WDA/screenshot occurred; next gated action is explicit."
    likely_misfire: "Running real device or self-hosted workflow actions instead of stopping at preflight, or committing private values into the public repo."
    blind_spots_considered:
      - "Whether the private adapter should be committed or parked."
      - "Private artifacts may pre-exist and should not be mixed into adapter work."
      - "Runner/device readiness checks can accidentally become mutating actions."
      - "Public GoalBuddy files must remain sanitized."
      - "Infrastructure work should be split into explicit approval gates."
    existing_plan_facts:
      - "Validated private adapter exists from the previous tranche."
      - "Private repo has pre-existing untracked artifacts."
      - "Next work should run preflight-only readiness checks."
      - "No workflow dispatch, app install, WDA, screenshots, host-app automation, or UI smoke in this tranche."
      - "A later tranche may test infrastructure after explicit target/action approval."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  exact_human_approval_can_terminal_wait: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/private-adapter-infrastructure-preflight/"
    command: "node /Users/neonwatty/.codex/plugins/cache/goalbuddy/goalbuddy/0.3.9/skills/goalbuddy/surfaces/local-goal-board/scripts/local-goal-board.mjs --goal docs/goals/private-adapter-infrastructure-preflight"

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: medium
    objective: "Map current private adapter status, pre-existing private artifacts, and safe preflight commands without mutating runner, device, app, or workflow state."
    inputs:
      - "Goal charter."
      - "Previous private-adapter validation receipts."
      - "Private repo status, read-only."
      - "Public Apple Agent Kit CLI and docs, read-only."
    constraints:
      - "Read-only."
      - "Do not commit private adapter or public board changes in this task."
      - "Do not dispatch workflows."
      - "Do not install apps, start WDA, take screenshots, launch host apps, or run UI smoke."
      - "Do not print secrets, tokens, signing values, bundle IDs, device IDs, or private runner labels in public committed notes."
    expected_output:
      - "Private adapter status: commit candidate | park | ambiguous."
      - "Private artifact hygiene summary."
      - "Safe runner preflight command candidates."
      - "Safe device readiness command candidates."
      - "Candidate Worker package with allowed files, verify commands, and stop conditions."
    receipt:
      result: done
      note: "notes/T001-infrastructure-scout.md"
      summary: "Selected private adapter exists and validates but is untracked; unrelated private artifacts are pre-existing; safe preflight can gather sanitized local Xcode and GitHub runner/workflow metadata before any device action."
      evidence:
        - "previous private dry-run validation receipts"
        - "private adapter exists check"
        - "private adapter validator exit status"
        - "private repo porcelain status summary"
        - "public Xcode readiness count summary"
        - "GitHub runner/workflow metadata counts"
      commands:
        - cmd: "GoalBuddy update checker"
          status: pass
        - cmd: "GoalBuddy state checker"
          status: pass
        - cmd: "private adapter exists/tracked status check"
          status: pass
        - cmd: "aak validate-adapter against private adapter"
          status: pass
        - cmd: "aak check-xcode summarized output"
          status: pass
        - cmd: "GitHub runner/workflow metadata count checks"
          status: pass
      private_adapter_status: ambiguous
      physical_device_actions: false
      workflow_dispatch_actions: false
      spawned_tasks:
        - T002

  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Choose the first largest safe Worker package: adapter hygiene, runner preflight, or device readiness."
    inputs:
      - "T001 receipt or note."
      - "Goal oracle."
      - "Current public and private repo status."
    constraints:
      - "Do not implement."
      - "Reject any Worker package that dispatches workflows or mutates runner/device/app state."
      - "Keep private details out of public committed files."
      - "Set explicit allowed_files, verify commands, and stop_if conditions."
    expected_output:
      - "Decision: approved | revise | blocked."
      - "Exact Worker objective."
      - "allowed_files."
      - "verify."
      - "stop_if."
      - "Deferred follow-up tasks, if any."
    receipt:
      result: done
      decision: approved
      full_outcome_complete: false
      rationale: "Approve the largest safe Worker slice that does not mutate infrastructure: park the adapter explicitly for this tranche, collect sanitized adapter/local Xcode/GitHub metadata receipts, and inspect device helper safety before any physical-device command."
      exact_worker_objective: "Record a sanitized preflight receipt that parks the untracked private adapter for this tranche, reruns read-only adapter/local Xcode/GitHub metadata checks, and inspects physical-device helper scripts for read-only safety without running device commands."
      allowed_files:
        - "docs/goals/private-adapter-infrastructure-preflight/state.yaml"
        - "docs/goals/private-adapter-infrastructure-preflight/notes/T003-preflight-receipt.md"
      verify:
        - "aak validate-adapter against the private adapter, output suppressed except exit status"
        - "aak check-xcode summarized status/counts"
        - "GitHub runner/workflow metadata count checks without names or labels"
        - "read-only inspection of private device helper scripts"
        - "public GoalBuddy board private-identifier grep"
        - "GoalBuddy state checker"
      stop_if:
        - "Need to dispatch workflows."
        - "Need to install apps, start WDA, take screenshots, launch host apps, or run UI smoke."
        - "Need to print or commit private app names, bundle IDs, device IDs, signing teams, tokens, runner names, runner labels, or product-specific workflow copies in public files."
        - "Need files outside the approved GoalBuddy note/state files."
        - "A candidate device readiness command is not clearly read-only."
      deferred_follow_up_tasks:
        - T004

  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Record a sanitized preflight receipt that parks the untracked private adapter for this tranche, reruns read-only adapter/local Xcode/GitHub metadata checks, and inspects physical-device helper scripts for read-only safety without running device commands."
    allowed_files:
      - "docs/goals/private-adapter-infrastructure-preflight/state.yaml"
      - "docs/goals/private-adapter-infrastructure-preflight/notes/T003-preflight-receipt.md"
    verify:
      - "aak validate-adapter against the private adapter, output suppressed except exit status"
      - "aak check-xcode summarized status/counts"
      - "GitHub runner/workflow metadata count checks without names or labels"
      - "read-only inspection of private device helper scripts"
      - "public GoalBuddy board private-identifier grep"
      - "GoalBuddy state checker"
    stop_if:
      - "Need files outside Judge-approved allowed_files."
      - "Need to commit private values to the public repo."
      - "Need workflow dispatch, app install, WDA, screenshots, host-app automation, or UI smoke."
      - "Preflight command is discovered to be mutating."
      - "Verification fails twice for the same reason."
    receipt:
      result: done
      note: "notes/T003-preflight-receipt.md"
      changed_files:
        - "docs/goals/private-adapter-infrastructure-preflight/notes/T003-preflight-receipt.md"
        - "docs/goals/private-adapter-infrastructure-preflight/state.yaml"
      summary: "Parked the untracked private adapter for this tranche, reran read-only adapter/local Xcode/GitHub metadata checks, and confirmed candidate device helpers look read-only by pattern inspection."
      commands:
        - cmd: "aak validate-adapter against the private adapter, output suppressed except exit status"
          status: pass
        - cmd: "aak check-xcode summarized status/counts"
          status: pass
        - cmd: "GitHub runner/workflow metadata count checks without names or labels"
          status: pass
        - cmd: "read-only inspection of private device helper scripts"
          status: pass
        - cmd: "public GoalBuddy board private-identifier grep"
          status: pass
      physical_device_actions: false
      workflow_dispatch_actions: false

  - id: T004
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Run one read-only physical-device availability check and record only sanitized count/status evidence."
    allowed_files:
      - "docs/goals/private-adapter-infrastructure-preflight/state.yaml"
      - "docs/goals/private-adapter-infrastructure-preflight/notes/T004-device-readiness.md"
    verify:
      - "private device listing helper exits successfully or records a precise blocker"
      - "device output is reduced to sanitized status/count evidence only"
      - "no install, WDA, screenshot, app launch, UI smoke, or workflow dispatch occurred"
      - "public GoalBuddy board private-identifier grep"
      - "GoalBuddy state checker"
    stop_if:
      - "T003 completed all required preflight evidence."
      - "Need workflow dispatch, app install, WDA, screenshots, host-app automation, or UI smoke."
      - "Need explicit user approval for a mutating action."
      - "Need files outside PM/Judge-approved allowed_files."
    receipt:
      result: done
      note: "notes/T004-device-readiness.md"
      changed_files:
        - "docs/goals/private-adapter-infrastructure-preflight/notes/T004-device-readiness.md"
        - "docs/goals/private-adapter-infrastructure-preflight/state.yaml"
      summary: "Ran read-only private physical-device availability helpers with output reduced to sanitized status/counts; list and preview resolution checks passed."
      commands:
        - cmd: "private device listing helper with output captured and reduced to counts/status"
          status: pass
        - cmd: "private preview target resolver with output suppressed/reduced to status"
          status: pass
        - cmd: "GoalBuddy state checker before execution"
          status: pass
      physical_device_readiness: "read-only availability check passed"
      physical_device_actions: "read-only listing/resolution only"
      workflow_dispatch_actions: false

  - id: T005
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Decide the next gated infrastructure action after preflight evidence is gathered."
    inputs:
      - "Done Worker receipts."
      - "Adapter hygiene evidence."
      - "Runner/device preflight evidence or blockers."
      - "Public leakage check."
    constraints:
      - "Read-only."
      - "Do not dispatch workflows or mutate infrastructure."
      - "Do not expose private details in public committed notes."
    expected_output:
      - "readiness: ready | not_ready."
      - "Recommended next gated action."
      - "Required exact approval phrase or operator input."
      - "Risks to carry forward."
    receipt:
      result: done
      decision: approved
      readiness: ready
      full_outcome_complete: false
      summary: "Preflight evidence is sufficient for a later gated infrastructure action. Recommend dispatching a private runner-health workflow first, before any install, WDA, screenshot, host-app automation, UI smoke, or full physical-device workflow."
      evidence:
        - "private adapter is parked for this tranche and validates"
        - "unrelated private artifacts remain untouched"
        - "local Xcode readiness check passed"
        - "GitHub runner metadata shows an online self-hosted runner"
        - "GitHub workflow metadata is readable"
        - "read-only physical-device listing and preview resolution checks passed with sanitized output"
        - "public leakage grep returned no matches"
      recommended_next_gated_action: "Dispatch the private runner-health workflow for the selected self-hosted runner only; do not install apps, start WDA, take screenshots, launch host apps, run UI smoke, or dispatch physical-device smoke in that first gated action."
      required_exact_approval_phrase: "Approve private runner-health workflow dispatch only; no install, WDA, screenshots, host-app automation, UI smoke, or physical-device smoke."
      risks_to_carry_forward:
        - "The private adapter remains untracked until the operator chooses private adapter commit policy."
        - "Runner health dispatch will create remote workflow state and therefore requires exact approval."
        - "Any later physical-device smoke needs a separate exact approval that names the target action."

  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Final audit: decide whether the infrastructure preflight tranche is complete."
    inputs:
      - "All done task receipts."
      - "Last verification commands."
      - "Current dirty diff in public and private repos."
      - "Goal oracle."
    constraints:
      - "Do not implement."
      - "Reject completion if required Worker work remains queued or active."
      - "Reject completion if adapter hygiene, preflight evidence/blockers, leakage proof, or next-action decision is missing."
      - "Reject completion if real infrastructure was touched during this tranche."
    expected_output:
      - "complete | not_complete."
      - "full_outcome_complete: true | false."
      - "Evidence mapped to the oracle."
      - "Missing evidence or next task if not complete."
    receipt:
      result: done
      decision: complete
      full_outcome_complete: true
      summary: "Infrastructure preflight tranche is complete: adapter hygiene is explicit, runner/local readiness evidence exists, read-only device readiness passed, no prohibited infrastructure action occurred, public leakage checks pass, and the next gated action is explicit."
      evidence_mapped_to_oracle:
        adapter_hygiene: "Private adapter validates and is explicitly parked untracked for this tranche pending operator commit-policy decision."
        artifact_hygiene: "Private repo has hundreds of unrelated untracked artifacts; they were left untouched and out of public receipts."
        runner_readiness: "Local Xcode readiness passed; GitHub metadata shows one online self-hosted runner and active workflows."
        device_readiness: "Read-only device listing and preview resolution helpers passed with output reduced to sanitized counts/status."
        prohibited_actions: "No workflow dispatch, app install, WDA, screenshots, host-app automation, UI smoke, or physical-device smoke occurred."
        public_leakage_check: "Private-identifier grep over the public GoalBuddy tranche returned no matches."
        next_gated_action: "T005 recommends private runner-health workflow dispatch only, with an exact approval phrase and no install/WDA/screenshot/smoke."
      commands:
        - cmd: "GoalBuddy state checker"
          status: pass
        - cmd: "public private-identifier grep"
          status: pass
        - cmd: "git diff --check"
          status: pass
        - cmd: "public git status check"
          status: pass
        - cmd: "private adapter tracked/status summary"
          status: pass
      residual_risk: "The next action will mutate remote workflow state and therefore must wait for exact approval; the private adapter remains untracked until private adapter commit policy is chosen."

checks:
  dirty_fingerprint: "public board receipts modified only"
  last_verification:
    result: pass
    task: T999
    commands:
      - "GoalBuddy state checker"
      - "public private-identifier grep"
      - "git diff --check"
      - "public git status check"
      - "private adapter tracked/status summary"
