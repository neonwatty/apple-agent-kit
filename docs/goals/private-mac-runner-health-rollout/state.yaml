version: 2

goal:
  title: "Private Mac Runner Health Rollout"
  slug: "private-mac-runner-health-rollout"
  kind: existing_plan
  tranche: "Bind, render, install, dispatch, and audit the device-free Mac runner-health workflow for the selected private Mac runner."
  status: done
  oracle:
    signal: "The selected private Mac runner has a validated private adapter binding, a reviewed device-free runner-health workflow, an exact-approval dispatch receipt or precise blocker, a sanitized runner-health result, no iPhone/device/app action, no public private-value leakage, and an explicit ready/not-ready next decision."
    cadence: "after each Worker package and at final audit"
    final_proof: "Final Judge or PM receipt records full_outcome_complete: true and lists adapter binding, rendered workflow review, private workflow installation, dispatch approval/result or blocker, leakage check, and ready/not-ready decision."
  intake:
    original_request: "Make a detailed GoalBuddy prep board for Mac Mini 2 hardware plans after parking the preview iPhone."
    interpreted_outcome: "Prepare and execute a GoalBuddy-controlled rollout tranche for the private, device-free Mac runner-health workflow."
    input_shape: existing_plan
    audience: "Apple Agent Kit maintainers and private adapter maintainers."
    authority: approved_for_prep
    proof_type: test
    completion_proof: "Private adapter binding exists or is explicitly blocked; private runner-health workflow is rendered/reviewed/installed or blocked; exact approval is obtained before dispatch; the runner-health result is recorded; no iPhone/device/app actions occur; next readiness decision is explicit."
    likely_misfire: "Reusing an iOS physical-device runner-health workflow, touching the parked preview iPhone, dispatching without exact approval, leaking private runner labels, or treating render success as hardware readiness."
    blind_spots_considered:
      - "Whether private adapter changes should be committed or parked."
      - "Whether workflow installation should happen on a private branch."
      - "Which private workflow file path should receive the rendered Mac runner-health workflow."
      - "How to confirm the workflow is device-free before dispatch."
      - "How to sanitize logs and host evidence."
      - "What remediation path to take if the runner-health workflow fails."
    existing_plan_facts:
      - "Preview iPhone is parked for this tranche."
      - "Use the public device-free macOS runner-health template."
      - "Bind private ci.macosRunnerLabels for the selected Mac runner."
      - "Render workflows privately and review only the Mac runner-health workflow."
      - "Install only the Mac runner-health workflow into the private repo."
      - "Dispatch only after exact approval."
      - "Record a sanitized runner-health receipt."
      - "Decide whether the selected Mac runner is ready for CI use or needs remediation."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  exact_human_approval_can_terminal_wait: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/private-mac-runner-health-rollout/"
    command: "node /Users/neonwatty/.codex/plugins/cache/goalbuddy/goalbuddy/0.3.9/skills/goalbuddy/surfaces/local-goal-board/scripts/local-goal-board.mjs --goal docs/goals/private-mac-runner-health-rollout"

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: medium
    objective: "Map current private adapter/workflow status, selected Mac runner metadata needs, and safe files for the device-free runner-health rollout without editing or dispatching anything."
    inputs:
      - "Goal charter."
      - "Public Mac runner-health template and adapter contract."
      - "Private repo status, read-only."
      - "Private adapter status, read-only."
      - "Private workflow surface, read-only."
    constraints:
      - "Read-only."
      - "Do not edit private adapter or workflows."
      - "Do not dispatch workflows."
      - "Do not touch the parked preview iPhone."
      - "Do not install apps, start WDA, take screenshots, launch host apps, run UI smoke, run physical-device smoke, or run product CI."
      - "Do not print private repo names, hostnames, runner names, runner labels, bundle IDs, device IDs, signing teams, tokens, or secret names in public committed notes."
    expected_output:
      - "Private adapter status: has macOS runner binding | needs binding | ambiguous."
      - "Private workflow status: installed | absent | conflicting | ambiguous."
      - "Sanitized runner metadata needs."
      - "Safe private files for the first Worker package."
      - "Candidate Worker package with allowed files, verify commands, and stop conditions."
    receipt:
      result: done
      note: "notes/T001-runner-rollout-scout.md"
      summary: "Private adapter validates but lacks ci.macosRunnerLabels; the device-free Mac runner-health workflow is absent; one self-hosted runner is online, but selected-runner label specificity is ambiguous."
      evidence:
        - "GoalBuddy update checker"
        - "GoalBuddy state checker"
        - "private adapter exists and validates"
        - "private adapter ci.macosRunnerLabels boolean/count summary"
        - "private workflow existence check"
        - "GitHub self-hosted runner metadata count summary"
      facts:
        - "adapter_status=needs_binding"
        - "workflow_status=absent"
        - "online_runner_count=1"
        - "selected_runner_label_specificity=ambiguous"
      ambiguity_requiring_judge:
        - "Whether to bind a broad generic self-hosted macOS label set or stop before dispatch until the selected runner has/uses a dedicated private label."
      commands:
        - cmd: "GoalBuddy update checker"
          status: pass
        - cmd: "GoalBuddy state checker"
          status: pass
        - cmd: "private adapter existence/status/validation checks"
          status: pass
        - cmd: "private workflow existence check"
          status: pass
        - cmd: "GitHub runner metadata count check"
          status: pass
      note_needed: true
      spawned_tasks:
        - T002

  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Approve the largest safe Worker package for adapter binding, private render/review, and workflow installation up to the dispatch approval gate."
    inputs:
      - "T001 receipt or note."
      - "Goal oracle."
      - "Current public and private repo status."
    constraints:
      - "Do not implement."
      - "Reject any package that dispatches workflows or touches iPhone/device/app automation."
      - "Keep private details out of public committed files."
      - "Set exact allowed_files, verify commands, and stop_if conditions."
    expected_output:
      - "Decision: approved | revise | blocked."
      - "Exact Worker objective."
      - "allowed_files."
      - "verify."
      - "stop_if."
      - "Whether dispatch must wait for a separate exact approval task."
    receipt:
      result: done
      decision: approved
      full_outcome_complete: false
      rationale: "Approve one bounded Worker to update the private adapter binding, render privately, review/install only the device-free Mac runner-health workflow, and stop before dispatch. Dispatch remains gated because selected-runner label specificity is ambiguous."
      exact_worker_objective: "Update the private adapter with a Mac runner-health label binding, render workflows into private scratch output, review only the rendered Mac runner-health workflow for device-free behavior, install only that workflow into the private workflow surface, and stop before dispatch."
      allowed_files:
        - "selected private repo root adapter file (private path withheld from public board)"
        - "selected private repo Mac runner-health workflow file (private path withheld from public board)"
        - "docs/goals/private-mac-runner-health-rollout/state.yaml"
        - "docs/goals/private-mac-runner-health-rollout/notes/T003-binding-render-install.md"
      verify:
        - "private adapter validates after binding"
        - "aak render-workflows succeeds into private scratch output"
        - "rendered Mac runner-health workflow uses the private Mac runner label binding"
        - "rendered and installed Mac runner-health workflow do not contain iPhone/device/app/smoke actions beyond a negative device-free assertion"
        - "private repo diff is limited to the private adapter and Mac runner-health workflow plus pre-existing unrelated artifacts"
        - "public GoalBuddy board private-identifier grep"
        - "GoalBuddy state checker"
      stop_if:
        - "Need workflow dispatch."
        - "Need iPhone/device/app automation, install, WDA, screenshots, host-app automation, UI smoke, physical-device smoke, or product CI."
        - "Need to commit private values to the public repo."
        - "Need private files outside the adapter and Mac runner-health workflow."
        - "Cannot choose a safe private Mac runner label binding without operator input."
      dispatch_gate: "Dispatch must wait for a separate exact approval task after T003, and T004 must decide whether label specificity is good enough."

  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Update the private adapter with a Mac runner-health label binding, render workflows into private scratch output, review only the rendered Mac runner-health workflow for device-free behavior, install only that workflow into the private workflow surface, and stop before dispatch."
    allowed_files:
      - "selected private repo root adapter file (private path withheld from public board)"
      - "selected private repo Mac runner-health workflow file (private path withheld from public board)"
      - "docs/goals/private-mac-runner-health-rollout/state.yaml"
      - "docs/goals/private-mac-runner-health-rollout/notes/T003-binding-render-install.md"
    verify:
      - "private adapter validates after binding"
      - "aak render-workflows succeeds into private scratch output"
      - "rendered Mac runner-health workflow uses the private Mac runner label binding"
      - "rendered and installed Mac runner-health workflow do not contain iPhone/device/app/smoke actions beyond a negative device-free assertion"
      - "private repo diff is limited to the private adapter and Mac runner-health workflow plus pre-existing unrelated artifacts"
      - "public GoalBuddy board private-identifier grep"
      - "GoalBuddy state checker"
    stop_if:
      - "Need files outside Judge-approved allowed_files."
      - "Need to commit private values to the public repo."
      - "Need workflow dispatch."
      - "Need iPhone/device/app automation, install, WDA, screenshots, host-app automation, UI smoke, physical-device smoke, or product CI."
      - "Private adapter target or workflow path is ambiguous."
      - "Verification fails twice for the same reason."
    receipt:
      result: done
      note: "notes/T003-binding-render-install.md"
      changed_files:
        - "selected private repo root adapter file (private path withheld from public board)"
        - "selected private repo Mac runner-health workflow file (private path withheld from public board)"
        - "docs/goals/private-mac-runner-health-rollout/notes/T003-binding-render-install.md"
        - "docs/goals/private-mac-runner-health-rollout/state.yaml"
      commands:
        - cmd: "GoalBuddy state checker before Worker execution"
          status: pass
        - cmd: "private adapter validates after binding"
          status: pass
        - cmd: "aak render-workflows succeeds into private scratch output"
          status: pass
        - cmd: "installed workflow matches rendered scratch workflow"
          status: pass
        - cmd: "installed workflow contains Mac runner label binding"
          status: pass
        - cmd: "device-action scan excluding negative device-free assertion"
          status: pass
        - cmd: "private null-delimited status parse"
          status: pass
        - cmd: "public GoalBuddy board private-identifier grep"
          status: pass
      summary: "Private adapter binding, scratch render, device-free review, and private Mac runner-health workflow installation completed; no workflow dispatch or device/app action occurred."
      remaining_blockers:
        - "Selected-runner label specificity is ambiguous because the binding is generic self-hosted macOS rather than a proven dedicated selected-runner label."
        - "Workflow dispatch still requires exact approval after Judge gate review."
      verification_attempts: 1
      stopped_because: null

  - id: T004
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Review the private binding/render/install receipt and decide whether the exact runner-health dispatch gate can be opened."
    inputs:
      - "T003 receipt."
      - "Rendered private workflow review."
      - "Private repo diff/status summary."
      - "Public leakage check."
    constraints:
      - "Read-only."
      - "Do not dispatch workflows."
      - "Reject dispatch if the rendered workflow contains device/app/smoke actions."
      - "Keep private details out of public committed files."
    expected_output:
      - "dispatch_gate: ready | not_ready."
      - "Exact workflow to dispatch, sanitized for public board."
      - "Required exact approval phrase."
      - "Risks or blockers."
    receipt:
      result: done
      decision: rejected
      dispatch_gate: not_ready
      full_outcome_complete: false
      rationale: "The installed workflow is device-free and review passed, but dispatch is not ready because the current private binding uses a generic self-hosted macOS label set rather than a proven dedicated selected-runner label."
      evidence:
        - "T003 private adapter binding/render/install receipt"
        - "device-action scan passed after excluding negative assertion"
        - "installed workflow matches scratch render"
        - "public leakage grep returned no matches"
      sanitized_workflow_to_dispatch: "private Mac runner-health workflow"
      required_operator_input: "Either add/confirm a dedicated selected-runner label in the private adapter, or explicitly approve dispatch using the broader generic self-hosted macOS binding."
      required_exact_approval_phrase_if_generic_binding_is_accepted: "Approve private Mac runner-health workflow dispatch using the generic self-hosted macOS binding; no iPhone/device/app automation, install, WDA, screenshots, UI smoke, physical-device smoke, product build, or product test."
      risks_or_blockers:
        - "Generic self-hosted macOS targeting is acceptable only while the runner pool remains intentionally constrained."
        - "A dedicated private runner label is safer before dispatch."
      blocked_tasks:
        - T005

  - id: T005
    type: worker
    assignee: Worker
    status: blocked
    reasoning_hint: medium
    objective: "After exact approval is recorded, dispatch only the private Mac runner-health workflow and record a sanitized result receipt."
    allowed_files: []
    verify: []
    stop_if:
      - "Exact approval phrase is missing or does not match the Judge-required approval."
      - "The workflow to dispatch is not the private Mac runner-health workflow."
      - "Dispatch command would target an iOS physical-device, install, WDA, screenshot, host-app automation, UI smoke, physical-device smoke, or product CI workflow."
      - "Need to expose private runner labels, hostnames, repo names, tokens, or secret names in public files."
      - "GitHub auth or permissions are missing."
    receipt:
      result: blocked
      summary: "Dispatch blocked by T004: runner-health workflow is installed and device-free, but selected-runner label specificity is not strong enough for Mac Mini 2 without operator input."
      waiting_for_user_approval: true
      required_reply: "Approve private Mac runner-health workflow dispatch using the generic self-hosted macOS binding; no iPhone/device/app automation, install, WDA, screenshots, UI smoke, physical-device smoke, product build, or product test."
      alternative_unblock: "Add or confirm a dedicated selected-runner label in the private adapter, then rerun the dispatch gate review."

  - id: T006
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Decide whether the selected Mac runner is ready for CI use or needs a remediation sub-tranche."
    inputs:
      - "T005 dispatch/result receipt or blocker."
      - "Sanitized runner-health logs or receipt."
      - "Private repo status."
      - "Public leakage check."
    constraints:
      - "Read-only."
      - "Do not run additional workflows."
      - "Do not touch iPhone/device/app automation."
      - "Keep private details out of public committed files."
    expected_output:
      - "readiness: ready | not_ready | blocked."
      - "Runner-health result summary."
      - "Remediation tasks if not ready."
      - "Next gated action if ready."
    receipt:
      result: done
      decision: rejected
      readiness: not_ready
      full_outcome_complete: false
      rationale: "The selected Mac runner is not ready for CI use because runner-health dispatch was blocked before producing a hardware result. The private workflow is prepared, but selected-runner label specificity or exact approval is still required."
      evidence:
        - "T003 binding/render/install receipt"
        - "T004 dispatch gate rejection"
        - "T005 blocked dispatch receipt"
      runner_health_result_summary: "No runner-health result exists; dispatch did not occur."
      remediation_tasks:
        - "Add or confirm a dedicated selected-runner label in the private adapter, then rerun the dispatch gate review."
        - "Alternatively, explicitly approve dispatch using the generic self-hosted macOS binding while the runner pool remains intentionally constrained."
      next_gated_action_if_ready_later: "Dispatch only the private Mac runner-health workflow and record a sanitized result receipt."

  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Final audit: decide whether the Mac runner-health rollout tranche is complete."
    inputs:
      - "All done task receipts."
      - "Last verification commands."
      - "Current dirty diff in public and private repos."
      - "Goal oracle."
    constraints:
      - "Do not implement."
      - "Reject completion if required Worker work remains queued or active."
      - "Reject completion if adapter binding, workflow review/install, dispatch approval/result or blocker, leakage proof, or readiness decision is missing."
      - "Reject completion if iPhone/device/app automation occurred during this tranche."
    expected_output:
      - "complete | not_complete."
      - "full_outcome_complete: true | false."
      - "Evidence mapped to the oracle."
      - "Missing evidence or next task if not complete."
    receipt:
      result: done
      decision: complete
      full_outcome_complete: true
      summary: "Mac runner-health rollout tranche is complete with a precise dispatch blocker: private adapter binding/render/install succeeded, the installed workflow is device-free, no prohibited iPhone/device/app action occurred, public leakage checks pass, and readiness is not_ready until label specificity or exact generic-binding approval is resolved."
      evidence_mapped_to_oracle:
        adapter_binding: "Private adapter validates after adding a Mac runner-health label binding."
        rendered_workflow_review: "Private scratch render succeeded; installed workflow matches scratch render."
        private_workflow_installation: "Private Mac runner-health workflow exists in the private workflow surface."
        dispatch_approval_or_blocker: "T004 rejected dispatch because the binding is generic self-hosted macOS rather than a proven dedicated selected-runner label; T005 is blocked with exact approval/unblock text."
        runner_health_result: "No runner-health result exists because dispatch did not occur."
        prohibited_actions: "No workflow dispatch, iPhone/device check, app install, WDA, screenshots, host-app automation, UI smoke, physical-device smoke, product build, or product test occurred."
        public_leakage_check: "Private-identifier grep over public GoalBuddy files returned no matches."
        private_repo_status: "Private status parse shows one adapter entry, one Mac runner-health workflow entry, pre-existing artifact entries, and no other changed paths."
        readiness_decision: "T006 marks the selected Mac runner not_ready until label specificity or exact generic-binding approval is resolved."
      commands:
        - cmd: "GoalBuddy state checker"
          status: pass
        - cmd: "public private-identifier grep"
          status: pass
        - cmd: "git diff --check"
          status: pass
        - cmd: "private adapter validation"
          status: pass
        - cmd: "installed workflow existence and device-action scan"
          status: pass
        - cmd: "private null-delimited status parse"
          status: pass
      residual_risk: "Private adapter and workflow changes are local/uncommitted in the private repo; dispatch requires either a dedicated selected-runner label or exact approval for generic self-hosted macOS targeting."

checks:
  dirty_fingerprint: "public board receipts modified; private adapter and Mac runner-health workflow changed locally"
  last_verification:
    result: pass
    task: T999
    commands:
      - "GoalBuddy state checker"
      - "public private-identifier grep"
      - "git diff --check"
      - "private adapter validation"
      - "installed workflow existence and device-action scan"
      - "private null-delimited status parse"
