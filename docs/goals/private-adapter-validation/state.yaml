version: 2

goal:
  title: "Private Adapter Validation"
  slug: "private-adapter-validation"
  kind: existing_plan
  tranche: "Validate Apple Agent Kit against one selected private Apple app repo using dry-run commands only."
  status: done
  oracle:
    signal: "A selected private adapter validates, `aak inspect` succeeds, workflows render into scratch/private output, comparison findings are recorded, public leakage checks pass, and final readiness is decided."
    cadence: "after each Worker package and at final audit"
    final_proof: "Final Judge or PM receipt records full_outcome_complete: true and lists the private dry-run checks, comparison evidence, public leakage check, and infrastructure go/no-go decision."
  intake:
    original_request: "Plan the private-adapter validation tranche with GoalBuddy prep."
    interpreted_outcome: "Prepare a GoalBuddy board for validating Apple Agent Kit against one private app repo without leaking private details or touching real infrastructure."
    input_shape: existing_plan
    audience: "Apple Agent Kit maintainers and private adapter maintainers."
    authority: approved
    proof_type: test
    completion_proof: "One selected private adapter is validated, inspected, rendered, compared, and audited with no public leakage and no real infrastructure side effects."
    likely_misfire: "Running physical or self-hosted workflows too early, committing private details to the public repo, or treating adapter creation as proof without dry-run validation."
    blind_spots_considered:
      - "Where private adapter files should live."
      - "How to refer to a private repo without committing its name to public history."
      - "Rendered workflow output should live in scratch or private paths."
      - "Public repo leakage checks must run after private work."
      - "Physical-device and self-hosted runner work must remain a later approved tranche."
    existing_plan_facts:
      - "Start with one selected private Apple app repo."
      - "Run dry-run commands first: validate-adapter, inspect, render-workflows."
      - "Compare rendered workflows to existing private workflows."
      - "Do not run Mac Mini, iPhone, WDA, install, screenshot, or host-app automation in this tranche."
      - "Decide readiness for a later infrastructure-testing tranche."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  exact_human_approval_can_terminal_wait: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/private-adapter-validation/"
    command: "node /Users/neonwatty/.codex/plugins/cache/goalbuddy/goalbuddy/0.3.9/skills/goalbuddy/surfaces/local-goal-board/scripts/local-goal-board.mjs --goal docs/goals/private-adapter-validation"

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: medium
    objective: "Identify the selected private repo path, existing private workflow surface, and safe adapter location without writing files or running infrastructure workflows."
    inputs:
      - "Goal charter."
      - "User-provided private target context from the conversation or operator prompt."
      - "Local filesystem/GitHub access, read-only."
      - "Public Apple Agent Kit CLI commands, read-only."
    constraints:
      - "Read-only."
      - "Do not write adapter files."
      - "Do not commit private repo names or private values to the public repo."
      - "Do not run physical-device, WDA, install, screenshot, host-app, or self-hosted runner workflows."
      - "Do not print secrets, tokens, signing values, bundle IDs, device IDs, or private runner labels in public committed notes."
    expected_output:
      - "Selected private repo path or a precise blocker if the target is ambiguous."
      - "Private workflow/script/test surfaces relevant to adapter validation, summarized safely."
      - "Recommended private adapter path."
      - "Candidate Worker package with allowed files, verify commands, and stop conditions."
    receipt:
      result: done
      note: "notes/T001-private-target-scout.md"
      summary: "Selected private iOS repo is available locally and through authenticated GitHub; workflow/script/test surfaces are sufficient for adapter dry-run validation."
      evidence:
        - "local private repo clone exists"
        - "authenticated GitHub repo metadata check"
        - "private workflow inventory"
        - "private XcodeGen project config"
        - "private iOS script inventory"
      commands:
        - cmd: "read-only local private repo status check"
          status: pass
        - cmd: "authenticated private repo metadata check"
          status: pass
        - cmd: "private workflow/script/test inventory"
          status: pass
      spawned_tasks:
        - T002

  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Review T001 findings and choose the largest safe Worker package for private adapter creation or validation."
    inputs:
      - "T001 receipt or note."
      - "Goal oracle."
      - "Current public repo status."
    constraints:
      - "Do not implement."
      - "Keep physical-device and self-hosted workflow execution out of scope."
      - "Keep private details out of public committed files."
      - "Set explicit allowed_files, verify commands, and stop_if conditions."
    expected_output:
      - "Decision: approved | revise | blocked."
      - "Exact Worker objective."
      - "allowed_files."
      - "verify."
      - "stop_if."
      - "Deferred follow-up tasks, if any."
    receipt:
      result: done
      decision: approved
      full_outcome_complete: false
      summary: "Approved a bounded Worker to create or update the private repo root adapter and run dry-run validation only."
      exact_worker_objective: "Create or update the selected private repo root adapter, then run `aak validate-adapter`, `aak inspect`, and `aak render-workflows` into a scratch directory."
      allowed_files:
        - "selected private repo root adapter file (private path withheld from public board)"
        - "docs/goals/private-adapter-validation/state.yaml"
        - "docs/goals/private-adapter-validation/notes/**"
      verify:
        - "aak validate-adapter against the private adapter"
        - "aak inspect against the selected private repo and private adapter"
        - "aak render-workflows into scratch output"
        - "public GoalBuddy board private-identifier grep"
      stop_if:
        - "Need to commit private values to the public repo."
        - "Need physical-device, WDA, install, screenshot, host-app, or self-hosted runner execution."
        - "Need files outside approved adapter/control-file scope."
        - "Adapter schema or selected target is ambiguous."

  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Create or update the selected private adapter and run dry-run validation selected by Judge."
    allowed_files:
      - "selected private repo root adapter file (private path withheld from public board)"
      - "docs/goals/private-adapter-validation/state.yaml"
      - "docs/goals/private-adapter-validation/notes/**"
    verify:
      - "aak validate-adapter against the private adapter"
      - "aak inspect against the selected private repo and private adapter"
      - "aak render-workflows into scratch output"
      - "public GoalBuddy board private-identifier grep"
    stop_if:
      - "Need files outside Judge-approved allowed_files."
      - "Need to commit private values to the public repo."
      - "Need physical-device, WDA, install, screenshot, host-app, or self-hosted runner execution."
      - "Adapter schema or target repo is ambiguous."
      - "Verification fails twice for the same reason."
    receipt:
      result: done
      changed_files:
        - "selected private repo root adapter file (private path withheld from public board)"
        - "docs/goals/private-adapter-validation/state.yaml"
      summary: "Created the selected private repo adapter and validated it with Apple Agent Kit dry-run commands."
      commands:
        - cmd: "aak validate-adapter against private adapter"
          status: pass
        - cmd: "aak inspect against selected private repo and private adapter"
          status: pass
        - cmd: "aak render-workflows into scratch output"
          status: pass
        - cmd: "private repo status check"
          status: pass
      artifacts:
        - "private adapter file in selected private repo"
        - "scratch validation JSON under /tmp"
        - "scratch inspect JSON under /tmp"
        - "scratch rendered workflows under /tmp"
      physical_device_actions: false
      self_hosted_runner_actions: false

  - id: T004
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Render workflows into scratch/private output and compare them against the selected private repo's existing workflows."
    allowed_files:
      - "docs/goals/private-adapter-validation/state.yaml"
      - "docs/goals/private-adapter-validation/notes/T004-render-comparison.md"
    verify: []
    stop_if:
      - "Need physical-device or self-hosted runner execution."
      - "Need to commit rendered private workflows to the public repo."
      - "Need files outside PM/Judge-approved allowed_files."
      - "Rendered workflow differences imply a public kit change is needed before private validation can continue."
    receipt:
      result: done
      note: "notes/T004-render-comparison.md"
      changed_files:
        - "docs/goals/private-adapter-validation/state.yaml"
        - "docs/goals/private-adapter-validation/notes/T004-render-comparison.md"
      summary: "Rendered scratch workflows were compared to the selected private workflow family; public templates map at skeleton level but private workflows include intentional product-specific gates and wrappers."
      commands:
        - cmd: "diff rendered simulator workflow against private simulator workflow"
          status: pass
        - cmd: "diff rendered physical workflow against private preview physical workflow"
          status: pass
        - cmd: "inspect rendered workflow receipt"
          status: pass
      artifacts:
        - "scratch rendered workflow directory under /tmp"
        - "scratch diff files under /tmp"
      physical_device_actions: false
      self_hosted_runner_actions: false

  - id: T005
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Decide whether private dry-run validation is sufficient to plan a later infrastructure-testing tranche."
    inputs:
      - "Done Worker receipts."
      - "Adapter validation result."
      - "Rendered workflow comparison result."
      - "Public leakage check."
    constraints:
      - "Read-only."
      - "Do not run Mac Mini, iPhone, WDA, install, screenshot, host-app, or self-hosted workflows."
      - "Do not expose private details in public committed notes."
    expected_output:
      - "readiness: ready | not_ready."
      - "Required approvals or private inputs for next tranche."
      - "Recommended next GoalBuddy goal or task."
    receipt:
      result: done
      decision: approved
      readiness: ready
      full_outcome_complete: false
      summary: "Private dry-run validation is sufficient to plan a later infrastructure-testing tranche; real runner/device work remains explicitly out of scope until approved."
      evidence:
        - "private adapter validation passed"
        - "private repo inspection passed"
        - "scratch workflow rendering passed"
        - "rendered workflow comparison completed"
        - "public board leakage grep returned no matches"
      required_approvals_or_inputs:
        - "Explicit target runner approval before self-hosted Mac workflow dispatch."
        - "Explicit target device approval before physical iPhone install, WDA, screenshots, or host-app automation."
        - "Decision whether private adapter should be committed in the private repo."
      recommended_next_goal: "Prepare an infrastructure-testing tranche that starts with runner/device preflight only, then asks before install or WDA actions."

  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Final audit: decide whether the private-adapter dry-run validation tranche is complete."
    inputs:
      - "All done task receipts."
      - "Last verification commands."
      - "Current dirty diff in public and private repos."
      - "Goal oracle."
    constraints:
      - "Do not implement."
      - "Reject completion if required Worker work remains queued or active."
      - "Reject completion if validation, rendering, comparison, or leakage proof is missing."
      - "Reject completion if real infrastructure was touched during this tranche."
    expected_output:
      - "complete | not_complete."
      - "full_outcome_complete: true | false."
      - "Evidence mapped to the oracle."
      - "Missing evidence or next task if not complete."
    receipt:
      result: done
      decision: complete
      full_outcome_complete: true
      summary: "Private-adapter dry-run validation is complete: the selected private adapter validates, private repo inspection succeeds, workflows render into scratch output, comparison findings are recorded, and readiness for a later infrastructure tranche is explicit."
      evidence_mapped_to_oracle:
        private_adapter_validation: "aak validate-adapter against selected private adapter passed"
        private_repo_inspection: "aak inspect against selected private repo and adapter passed"
        scratch_workflow_rendering: "aak render-workflows produced simulator, physical, macOS, and receipt files in scratch output"
        comparison_findings: "T004 comparison note records skeleton mappings, expected private differences, and follow-up candidates"
        public_leakage_check: "private-identifier grep over public GoalBuddy files returned no matches"
        infrastructure_decision: "T005 marks later infrastructure testing ready only after explicit runner/device approval"
      commands:
        - cmd: "aak validate-adapter against selected private adapter"
          status: pass
        - cmd: "aak inspect against selected private repo and adapter"
          status: pass
        - cmd: "aak render-workflows into scratch output"
          status: pass
        - cmd: "diff rendered simulator workflow against private simulator workflow"
          status: pass
        - cmd: "diff rendered physical workflow against private preview workflow"
          status: pass
        - cmd: "public private-identifier grep"
          status: pass
        - cmd: "git diff --check"
          status: pass
      residual_risk: "The private adapter remains an uncommitted private repo file until the operator decides whether to commit it; real runner/device execution remains intentionally untested."

checks:
  dirty_fingerprint: unknown
  last_verification:
    result: unknown
    task: null
    commands: []
