version: 2

goal:
  title: "Apple Agent Kit v0 Dry-Run Automation"
  slug: "v0-dry-run-automation"
  kind: existing_plan
  tranche: "Complete the public v0 dry-run command surface and proof loop without touching private adapters, physical devices, or self-hosted runners."
  status: done
  oracle:
    signal: "Adapter validation, plugin validation, CLI dry-run commands, workflow rendering checks, and private-identifier leakage grep all pass."
    cadence: "after each Worker package and at final audit"
    final_proof: "Final Judge or PM receipt records full_outcome_complete: true and lists the passing commands/direct inspections."
  intake:
    original_request: "Plan the next Apple Agent Kit work with GoalBuddy prep."
    interpreted_outcome: "Prepare a GoalBuddy board to build v0 dry-run automation in the new public apple-agent-kit repo."
    input_shape: existing_plan
    audience: "Open-source Apple Agent Kit users and future private adapter maintainers."
    authority: approved
    proof_type: test
    completion_proof: "A verified v0 dry-run command surface exists and public/private boundary checks pass."
    likely_misfire: "Creating more docs/templates without a usable dry-run command surface, or leaking private adapter details into the public repo."
    blind_spots_considered:
      - "Codex plugin manifest validation."
      - "Claude Code-compatible reuse without private repo names."
      - "No physical-device, WDA, install, screenshot, or self-hosted runner side effects in this tranche."
      - "Xcode availability can vary across machines, so Xcode checks must report capability rather than assume success."
      - "Workflow rendering must preserve generic placeholders and avoid private identifiers."
    existing_plan_facts:
      - "Public repo: /Users/neonwatty/Desktop/apple-agent-kit."
      - "Repository is public at https://github.com/neonwatty/apple-agent-kit."
      - "Private repo-specific adapters stay outside this repo."
      - "First useful milestone is v0 dry-run automation."
      - "Candidate command surface: aak inspect, aak validate-adapter, aak render-workflows, aak check-xcode, aak summarize-xcresult."
      - "Real Mac Mini and preview iPhone validation comes after dry-run proof and explicit approval."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  exact_human_approval_can_terminal_wait: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/v0-dry-run-automation/"
    command: "node /Users/neonwatty/.codex/plugins/cache/goalbuddy/goalbuddy/0.3.9/skills/goalbuddy/surfaces/local-goal-board/scripts/local-goal-board.mjs --goal docs/goals/v0-dry-run-automation"

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: medium
    objective: "Map the current public scaffold, plugin constraints, verification commands, and the smallest useful v0 dry-run implementation path."
    inputs:
      - ".codex-plugin/plugin.json"
      - "README.md"
      - "docs/"
      - "scripts/"
      - "skills/"
      - "templates/"
      - "Goal oracle in docs/goals/v0-dry-run-automation/goal.md"
    constraints:
      - "Read-only."
      - "Do not inspect private app repos during this task."
      - "Do not edit implementation files."
      - "Do not touch physical devices, WDA, screenshots, installs, or self-hosted runners."
      - "Prefer concrete file-path evidence over generic advice."
    expected_output:
      - "Repo map and current scaffold strengths/gaps."
      - "Recommended v0 CLI shape and dependency strategy."
      - "Verification commands available now."
      - "Risk list focused on public/private leakage and weak proof."
      - "Candidate Worker package with likely allowed_files, verify commands, and stop conditions."
    receipt:
      result: done
      note: "notes/T001-scout.md"
      summary: "Mapped the scaffold and found the main gap: no executable unified dry-run CLI yet."
      evidence:
        - ".codex-plugin/plugin.json"
        - "README.md"
        - "docs/design.md"
        - "docs/adapter-contract.md"
        - "scripts/validate-adapter.py"
        - "scripts/inspect-xcode-env.sh"
        - "templates/github-actions/"
      commands:
        - cmd: "scripts/validate-adapter.py templates/adapter.example.json"
          status: pass
        - cmd: "PYTHONPATH=/tmp/apple-agent-kit-pydeps python3 /Users/neonwatty/.codex/skills/.system/plugin-creator/scripts/validate_plugin.py /Users/neonwatty/Desktop/apple-agent-kit"
          status: pass
        - cmd: "scripts/inspect-xcode-env.sh | sed -n '1,120p'"
          status: pass
        - cmd: "private-identifier grep over public repo"
          status: pass_no_matches
      spawned_tasks:
        - T002

  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Review T001 findings and choose the first largest safe Worker package for v0 dry-run automation."
    inputs:
      - "T001 receipt or note."
      - "Goal oracle."
      - "Current git status."
    constraints:
      - "Do not implement."
      - "Keep physical-device and private-adapter work out of scope."
      - "Pick a Worker slice that produces working behavior, not only prose."
      - "Set explicit allowed_files, verify commands, and stop_if conditions."
    expected_output:
      - "Decision: approved | revise | blocked."
      - "Exact Worker objective."
      - "allowed_files."
      - "verify."
      - "stop_if."
      - "Deferred follow-up tasks, if any."
    receipt:
      result: done
      decision: approved
      full_outcome_complete: false
      summary: "Approved one coherent Worker package: implement the dependency-free v0 dry-run CLI and docs/wrapper updates."
      exact_worker_objective: "Implement `scripts/aak.py` with `inspect`, `validate-adapter`, `render-workflows`, `check-xcode`, and `summarize-xcresult`; keep all behavior dry-run and public-safe; update docs and wrappers so the command surface is discoverable and verified."
      allowed_files:
        - "scripts/aak.py"
        - "scripts/validate-adapter.py"
        - "scripts/inspect-xcode-env.sh"
        - "README.md"
        - "docs/design.md"
        - "docs/adapter-contract.md"
        - "docs/privacy-safe-evidence.md"
        - "templates/**"
        - ".gitignore"
        - "docs/goals/v0-dry-run-automation/state.yaml"
        - "docs/goals/v0-dry-run-automation/notes/**"
      verify:
        - "python3 scripts/aak.py --help"
        - "python3 scripts/aak.py validate-adapter templates/adapter.example.json"
        - "python3 scripts/aak.py inspect --repo . --adapter templates/adapter.example.json --json"
        - "rm -rf /tmp/aak-render && python3 scripts/aak.py render-workflows --adapter templates/adapter.example.json --output /tmp/aak-render --force && find /tmp/aak-render -type f | sort"
        - "python3 scripts/aak.py check-xcode --json"
        - "python3 scripts/aak.py summarize-xcresult /tmp/nonexistent.xcresult --json"
        - "scripts/validate-adapter.py templates/adapter.example.json"
        - "PYTHONPATH=/tmp/apple-agent-kit-pydeps python3 /Users/neonwatty/.codex/skills/.system/plugin-creator/scripts/validate_plugin.py /Users/neonwatty/Desktop/apple-agent-kit"
        - "private-identifier grep over public repo"
      stop_if:
        - "Need to inspect private app repos."
        - "Need to touch physical devices, WDA, screenshots, installs, or self-hosted runners."
        - "Need dependencies beyond the Python standard library."
        - "Need files outside allowed_files."
        - "Verification fails twice for the same reason."

  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Implement `scripts/aak.py` with `inspect`, `validate-adapter`, `render-workflows`, `check-xcode`, and `summarize-xcresult`; keep all behavior dry-run and public-safe; update docs and wrappers so the command surface is discoverable and verified."
    allowed_files:
