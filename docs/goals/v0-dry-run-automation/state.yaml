          status: pass
      physical_device_actions: false
      self_hosted_runner_actions: false

  - id: T004
    type: worker
    assignee: Worker
    status: blocked
    reasoning_hint: medium
    objective: "Add or update docs/templates/tests for the remaining v0 dry-run commands after T003, if the first package did not complete the full command surface."
    allowed_files: []
    verify: []
    stop_if:
