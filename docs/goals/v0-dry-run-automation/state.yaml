      - "python3 scripts/aak.py check-xcode --json"
      - "python3 scripts/aak.py summarize-xcresult /tmp/nonexistent.xcresult --json"
      - "scripts/validate-adapter.py templates/adapter.example.json"
      - "PYTHONPATH=/tmp/apple-agent-kit-pydeps python3 /Users/neonwatty/.codex/skills/.system/plugin-creator/scripts/validate_plugin.py /Users/neonwatty/Desktop/apple-agent-kit"
