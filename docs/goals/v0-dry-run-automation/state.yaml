          status: pass
        - cmd: "python3 scripts/aak.py inspect --repo . --adapter templates/adapter.example.json --json"
          status: pass
        - cmd: "rm -rf /tmp/aak-render && python3 scripts/aak.py render-workflows --adapter templates/adapter.example.json --output /tmp/aak-render --force && find /tmp/aak-render -type f | sort"
          status: pass
        - cmd: "python3 scripts/aak.py check-xcode --json"
          status: pass
        - cmd: "python3 scripts/aak.py summarize-xcresult /tmp/nonexistent.xcresult --json (expected exit 66)"
          status: pass
        - cmd: "PYTHONDONTWRITEBYTECODE=1 python3 -m py_compile scripts/aak.py scripts/validate-adapter.py"
          status: pass
        - cmd: "scripts/validate-adapter.py templates/adapter.example.json"
          status: pass
        - cmd: "PYTHONPATH=/tmp/apple-agent-kit-pydeps python3 /Users/neonwatty/.codex/skills/.system/plugin-creator/scripts/validate_plugin.py /Users/neonwatty/Desktop/apple-agent-kit"
