      - "Need private adapter values."
      - "Need physical-device or self-hosted runner execution."
      - "Need files outside PM/Judge-approved allowed_files."
    receipt:
      result: blocked
      reason: "not_required"
      summary: "T003 completed the full v0 dry-run command surface, so this follow-up Worker is no longer needed for the current tranche."

  - id: T005
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Assess readiness for a later private-adapter validation tranche without performing it."
    inputs:
      - "Done Worker receipts."
