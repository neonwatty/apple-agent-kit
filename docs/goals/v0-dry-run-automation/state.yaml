          status: pass
        - cmd: "python3 scripts/aak.py inspect --repo . --adapter templates/adapter.example.json --json"
          status: pass
        - cmd: "python3 scripts/aak.py render-workflows --adapter templates/adapter.example.json --output /tmp/aak-render --force"
          status: pass
