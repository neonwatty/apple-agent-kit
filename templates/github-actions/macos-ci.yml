name: macOS CI

on:
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  macos-ci:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer
      - name: Build
        run: make build
      - name: Test
        run: make test
      - name: Upload test result bundle
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 14
